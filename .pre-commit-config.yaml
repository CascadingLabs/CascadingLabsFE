repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: bun run biome check --write --no-errors-on-unmatched
        language: system
        files: \.(js|ts|cjs|mjs|jsx|tsx|json|jsonc|css|astro)$
        stages: [pre-commit]

      - id: biome-ci-check
        name: biome ci check
        entry: bun run biome check --no-errors-on-unmatched
        language: system
        files: \.(js|ts|cjs|mjs|jsx|tsx|json|jsonc|css|astro)$
        stages: [manual]

      - id: no-em-dash
        name: no em dash in prose
        entry: python scripts/check_no_em_dash.py
        language: system
        files: \.(adoc|md|mdx|rst|txt|ya?ml)$
        stages: [pre-commit, manual]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        stages: [pre-commit, manual]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.6
    hooks:
      - id: commitizen
        stages: [commit-msg]
