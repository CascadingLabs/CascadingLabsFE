<svg width="100%" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logo-title logo-desc">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&amp;display=swap');
    </style>
  </defs>
  <title id="logo-title">Cascading Labs Logo</title>
  <desc id="logo-desc">Cascading Labs logo — periodic table tile with symbol Cl on a dark blue background</desc>

  <!-- Background -->
  <rect x="0" y="0" width="500" height="500" fill="#0c2340"/>
  <!-- Atomic number top-left -->
  <text x="58" y="82"
    font-family="Inter, system-ui, sans-serif"
    font-size="26" font-weight="700"
    fill="#5ba4cf" opacity="0.8"
  >0</text>

  <!-- Float top-right -->
  <text x="442" y="82"
    font-family="Inter, system-ui, sans-serif"
    font-size="26" font-weight="700"
    fill="#5ba4cf" opacity="0.8"
    text-anchor="end"
  >24.26</text>

  <!-- Symbol -->
  <text x="250" y="310"
    font-family="Inter, system-ui, sans-serif"
    font-size="200" font-weight="800"
    fill="#5ba4cf" opacity="0.95"
    text-anchor="middle"
  >Cl</text>

  <!-- Element name -->
  <text x="250" y="382"
    font-family="Inter, system-ui, sans-serif"
    font-size="28" font-weight="400"
    fill="#5ba4cf" opacity="0.75"
    text-anchor="middle" letter-spacing="3"
  >Cascading Labs</text>
</svg>
