# Cascading Labs — Biome Lint CI
# Note: Astro file support in Biome is best-effort.
# The base biome.json relaxes rules for *.astro via overrides.

name: Lint (Biome)

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  biome:
    name: Biome check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome lint & format check
        run: bun run check
