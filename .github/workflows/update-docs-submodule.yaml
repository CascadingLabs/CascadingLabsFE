name: Update Yosoi-Docs Submodule

on:
  repository_dispatch:
    types: [update-yosoi-docs]

jobs:
  update-submodule:
    name: Bump docs/yosoi-docs to latest
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout CascadingLabsFE (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.DOCS_DEPLOY_TOKEN }}

      - name: Determine previous version from submodule
        id: prev
        run: |
          cd docs/yosoi-docs
          git fetch --tags origin
          PREV_TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")
          echo "tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          if [ -n "${PREV_TAG}" ]; then
            echo "slug=${PREV_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "Found previous version: ${PREV_TAG}"
          else
            echo "No previous version tag found — skipping snapshot"
          fi

      - name: Setup pnpm
        if: steps.prev.outputs.tag != ''
        uses: pnpm/action-setup@v5

      - name: Setup Node
        if: steps.prev.outputs.tag != ''
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: steps.prev.outputs.tag != ''
        run: pnpm install --frozen-lockfile

      - name: Build current site
        if: steps.prev.outputs.tag != ''
        run: pnpm build

      - name: Snapshot current docs as archived version
        if: steps.prev.outputs.tag != ''
        env:
          SLUG: ${{ steps.prev.outputs.slug }}
        run: |
          DOC_DIRS="yosoi guides reference contributing qscrape roadmap"
          mkdir -p "public/${SLUG}"
          for dir in $DOC_DIRS; do
            if [ -d "dist/${dir}" ]; then
              cp -r "dist/${dir}" "public/${SLUG}/${dir}"
            fi
          done

          # Preserve hashed assets so archived pages render correctly
          mkdir -p public/_astro
          cp -rn dist/_astro/* public/_astro/ 2>/dev/null || true

          # Inject noindex meta tag into archived pages
          find "public/${SLUG}" -name "index.html" \
            -exec sed -i 's/<head>/<head><meta name="robots" content="noindex,follow">/' {} +

          # Update robots.txt
          if ! grep -q "Disallow: /${SLUG}/" public/robots.txt; then
            echo "Disallow: /${SLUG}/" >> public/robots.txt
          fi

          echo "Archived docs snapshot at public/${SLUG}/"

      - name: Pull latest Yosoi-Docs
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          cd docs/yosoi-docs
          git fetch origin
          git checkout main
          git pull origin main

      - name: Add version entry to src/versions.ts
        if: steps.prev.outputs.tag != ''
        env:
          SLUG: ${{ steps.prev.outputs.slug }}
          LABEL: ${{ steps.prev.outputs.slug }}
        run: |
          echo "Archiving version: slug=${SLUG} label=${LABEL}"

          node -e "
            const fs = require('fs');
            const file = 'src/versions.ts';
            let content = fs.readFileSync(file, 'utf8');
            const entry = \`\t{ slug: '${SLUG}', label: '${LABEL}' },\n\`;
            const marker = 'export const versions: Version[] = [';
            const idx = content.indexOf(marker);
            if (idx === -1) { console.error('Could not find versions array'); process.exit(1); }
            const insertAt = content.indexOf('\n', idx) + 1;
            content = content.slice(0, insertAt) + entry + content.slice(insertAt);
            fs.writeFileSync(file, content);
            console.log('Inserted version entry for ${SLUG}');
          "

      - name: Sync versions.json and update archived HTML
        if: steps.prev.outputs.tag != ''
        run: |
          # Generate versions.json from versions.ts
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('src/versions.ts', 'utf8');
            const matches = [...content.matchAll(/\{\s*slug:\s*'([^']+)',\s*label:\s*'([^']+)'\s*\}/g)];
            const versions = matches.map(m => ({ slug: m[1], label: m[2] }));
            fs.writeFileSync('public/versions.json', JSON.stringify(versions, null, '\t') + '\n');
            console.log('Generated versions.json with', versions.length, 'entries');
          "

          # Build the HTML-escaped data-slugs value from versions.json
          SLUGS_ATTR=$(node -e "
            const vs = require('./public/versions.json');
            const inner = vs.map(v => '\&quot;' + v.slug + '\&quot;').join(',');
            process.stdout.write('[' + inner + ']');
          ")

          # Update data-slugs in ALL archived HTML
          for dir in public/0.0.1a*/; do
            [ -d "$dir" ] || continue
            find "$dir" -name "index.html" -exec sed -i \
              -e "s/data-slugs=\"[^\"]*\"/data-slugs=\"${SLUGS_ATTR}\"/" \
              {} +
          done

          echo "Synced versions.json and updated archived HTML"

      - name: Commit updates
        env:
          TAG: ${{ github.event.client_payload.tag }}
          PREV_SLUG: ${{ steps.prev.outputs.slug }}
        run: |
          git add docs/yosoi-docs src/versions.ts public/

          if git diff --cached --quiet; then
            echo "Nothing changed — already up to date"
          else
            MSG="chore: update yosoi-docs to ${TAG}"
            if [ -n "${PREV_SLUG}" ]; then
              MSG="${MSG} (archived ${PREV_SLUG})"
            fi
            git commit -m "$MSG"
            git push
            echo "Pushed update"
          fi
